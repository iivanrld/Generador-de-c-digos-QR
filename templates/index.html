<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>QR Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
/* ════════════════════════════════════════════
   VARIABLES & RESET
════════════════════════════════════════════ */
:root{
  --bg:       #07070f;
  --bg2:      #0d0d1a;
  --panel:    rgba(13,13,26,.85);
  --border:   rgba(0,255,159,.18);
  --glow:     #00ff9f;
  --glow2:    #00c8ff;
  --red:      #ff3c6e;
  --text:     #c8ffe8;
  --muted:    rgba(200,255,232,.35);
  --mono:     'Share Tech Mono', monospace;
  --head:     'Rajdhani', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-width:thin;scrollbar-color:var(--glow) var(--bg)}
body{
  font-family:var(--mono);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  cursor:crosshair;
}

/* ════════════════════════════════════════════
   CANVAS BACKGROUND
════════════════════════════════════════════ */
#bg-canvas{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;opacity:.45;
}

/* ════════════════════════════════════════════
   SCANLINE OVERLAY
════════════════════════════════════════════ */
body::after{
  content:'';
  position:fixed;inset:0;z-index:1;
  pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 2px,
    rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px
  );
}

/* ════════════════════════════════════════════
   LAYOUT WRAPPER
════════════════════════════════════════════ */
.app{
  position:relative;z-index:2;
  max-width:980px;
  margin:0 auto;
  padding:3rem 1.5rem 5rem;
  display:flex;flex-direction:column;align-items:center;gap:2.5rem;
}

/* ════════════════════════════════════════════
   HEADER
════════════════════════════════════════════ */
header{text-align:center;animation:fadeDown .8s ease both}

.logo-line{
  display:flex;align-items:center;justify-content:center;gap:1rem;
  margin-bottom:.5rem;
}
.logo-bracket{
  font-size:2.8rem;color:var(--glow);
  text-shadow:0 0 20px var(--glow),0 0 40px var(--glow);
  animation:pulse-bracket 2.5s ease-in-out infinite;
}
@keyframes pulse-bracket{
  0%,100%{text-shadow:0 0 20px var(--glow),0 0 40px var(--glow)}
  50%    {text-shadow:0 0 40px var(--glow),0 0 80px var(--glow),0 0 120px var(--glow)}
}

h1{
  font-family:var(--head);
  font-size:clamp(2.4rem,5vw,4rem);
  font-weight:700;letter-spacing:.12em;
  color:#fff;
  text-shadow:0 0 30px var(--glow2),0 0 60px rgba(0,200,255,.4);
  animation:glitch 6s steps(1) infinite;
}
@keyframes glitch{
  0%,94%,100%{clip-path:none;transform:none;color:#fff}
  95%{clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);
      transform:translate(-3px,0);color:var(--red)}
  96%{clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);
      transform:translate(3px,0);color:var(--glow2)}
  97%{clip-path:none;transform:none;color:#fff}
}

.tagline{
  font-size:.78rem;letter-spacing:.25em;
  color:var(--muted);text-transform:uppercase;
  margin-top:.6rem;
}
.tagline span{color:var(--glow);animation:blink 1.2s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* ════════════════════════════════════════════
   MAIN GRID
════════════════════════════════════════════ */
.grid{
  width:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1.8rem;
  animation:fadeUp .8s .2s ease both;
}
@media(max-width:660px){.grid{grid-template-columns:1fr}}

/* ════════════════════════════════════════════
   PANEL
════════════════════════════════════════════ */
.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:4px;
  padding:1.8rem;
  backdrop-filter:blur(12px);
  position:relative;
  overflow:hidden;
}
/* corner accents */
.panel::before,.panel::after{
  content:'';position:absolute;
  width:16px;height:16px;
}
.panel::before{top:-1px;left:-1px;
  border-top:2px solid var(--glow);border-left:2px solid var(--glow)}
.panel::after{bottom:-1px;right:-1px;
  border-bottom:2px solid var(--glow);border-right:2px solid var(--glow)}

.panel-title{
  font-family:var(--head);font-size:.7rem;font-weight:600;
  letter-spacing:.3em;text-transform:uppercase;
  color:var(--glow);margin-bottom:1.4rem;
  display:flex;align-items:center;gap:.6rem;
}
.panel-title::before{
  content:'';display:inline-block;
  width:8px;height:8px;border-radius:50%;
  background:var(--glow);
  box-shadow:0 0 8px var(--glow);
  animation:dot-pulse 1.5s ease-in-out infinite;
}
@keyframes dot-pulse{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.6);opacity:.6}
}

/* ════════════════════════════════════════════
   TABS
════════════════════════════════════════════ */
.tabs{display:flex;gap:.4rem;margin-bottom:1.4rem}
.tab{
  font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;
  padding:.42rem .9rem;
  border:1px solid var(--border);
  border-radius:2px;
  background:transparent;color:var(--muted);
  cursor:pointer;transition:all .25s;
  position:relative;overflow:hidden;
}
.tab::after{
  content:'';position:absolute;inset:0;
  background:var(--glow);opacity:0;
  transform:scaleX(0);transform-origin:left;
  transition:transform .25s,opacity .25s;
}
.tab:hover{color:var(--text);border-color:var(--glow)}
.tab.active{
  color:var(--bg);background:var(--glow);
  border-color:var(--glow);
  box-shadow:0 0 16px var(--glow);
}

/* ════════════════════════════════════════════
   FORM FIELDS
════════════════════════════════════════════ */
.fields{display:none;flex-direction:column;gap:.95rem}
.fields.active{display:flex}

.field label{
  display:block;font-size:.65rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:.3rem;
}
.field input,.field textarea{
  width:100%;
  background:rgba(0,0,0,.45);
  border:1px solid var(--border);
  border-radius:2px;
  padding:.65rem .9rem;
  color:var(--text);
  font-family:var(--mono);font-size:.82rem;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  resize:none;
}
.field input:focus,.field textarea:focus{
  border-color:var(--glow);
  box-shadow:0 0 0 1px var(--glow),0 0 18px rgba(0,255,159,.15);
}
.field input::placeholder,.field textarea::placeholder{color:rgba(200,255,232,.18)}

/* color row */
.color-row{display:flex;gap:.8rem}
.color-row .field{flex:1}
.field input[type=color]{
  height:38px;cursor:pointer;padding:3px 5px;
}

/* ════════════════════════════════════════════
   GENERATE BUTTON
════════════════════════════════════════════ */
.btn-gen{
  margin-top:.6rem;width:100%;
  padding:.85rem;
  font-family:var(--head);font-size:1.05rem;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  border:1px solid var(--glow);
  border-radius:2px;
  background:transparent;
  color:var(--glow);
  cursor:pointer;
  position:relative;overflow:hidden;
  transition:color .25s;
}
.btn-gen-bg{
  position:absolute;inset:0;
  background:var(--glow);
  transform:translateY(101%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.btn-gen:hover .btn-gen-bg{transform:translateY(0)}
.btn-gen:hover{color:var(--bg);box-shadow:0 0 30px rgba(0,255,159,.4)}
.btn-gen span{position:relative;z-index:1}
.btn-gen:disabled{opacity:.4;pointer-events:none}

/* ════════════════════════════════════════════
   PREVIEW PANEL
════════════════════════════════════════════ */
.preview{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:1.4rem;min-height:360px;
}

/* empty state */
.empty-state{
  text-align:center;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}
}
.empty-icon{
  font-size:3.5rem;line-height:1;
  filter:drop-shadow(0 0 12px var(--glow));
  margin-bottom:.8rem;
}
.empty-text{font-size:.72rem;letter-spacing:.12em;color:var(--muted)}

/* QR image wrapper */
.qr-wrap{
  display:none;
  position:relative;
  width:220px;height:220px;
}
.qr-wrap.visible{display:block;animation:qr-reveal .6s ease both}
@keyframes qr-reveal{
  from{transform:scale(.75) rotateY(-25deg);opacity:0;filter:blur(8px)}
  to  {transform:scale(1)   rotateY(0deg);  opacity:1;filter:blur(0)}
}

/* scan line that sweeps across the QR on reveal */
.scan-line{
  position:absolute;left:0;right:0;height:3px;top:0;
  background:linear-gradient(90deg,transparent,var(--glow),transparent);
  box-shadow:0 0 12px var(--glow);
  animation:scan-sweep .8s ease forwards;
  pointer-events:none;z-index:5;
}
@keyframes scan-sweep{
  from{top:0;opacity:1}to{top:100%;opacity:0}
}

/* QR corner decoration */
.qr-corners{
  position:absolute;inset:-6px;pointer-events:none;
  animation:corner-glow 2s ease-in-out infinite alternate;
}
@keyframes corner-glow{
  from{opacity:.5}to{opacity:1}
}
.qr-corners::before,.qr-corners::after{
  content:'';position:absolute;
  width:20px;height:20px;
}
.qr-corners::before{
  top:0;left:0;
  border-top:2px solid var(--glow);
  border-left:2px solid var(--glow);
  box-shadow:-2px -2px 8px rgba(0,255,159,.5);
}
.qr-corners::after{
  bottom:0;right:0;
  border-bottom:2px solid var(--glow);
  border-right:2px solid var(--glow);
  box-shadow:2px 2px 8px rgba(0,255,159,.5);
}

#qr-img{
  width:220px;height:220px;
  border-radius:4px;
  display:block;
}

/* data badge */
.data-badge{
  font-size:.68rem;letter-spacing:.05em;
  color:var(--muted);text-align:center;
  word-break:break-all;
  max-width:220px;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* download button */
.btn-dl{
  display:none;
  font-family:var(--mono);font-size:.75rem;letter-spacing:.1em;
  padding:.55rem 1.4rem;
  border:1px solid var(--glow2);
  border-radius:2px;
  background:transparent;
  color:var(--glow2);
  cursor:pointer;
  transition:all .25s;
}
.btn-dl.visible{display:block;animation:fadeUp .4s ease both}
.btn-dl:hover{
  background:var(--glow2);color:var(--bg);
  box-shadow:0 0 20px rgba(0,200,255,.4);
}

/* spinner */
.spinner{
  display:none;
  width:32px;height:32px;
  border:2px solid var(--border);
  border-top-color:var(--glow);
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ════════════════════════════════════════════
   TOAST
════════════════════════════════════════════ */
#toast{
  position:fixed;bottom:2rem;left:50%;
  transform:translateX(-50%) translateY(90px);
  background:var(--red);
  color:#fff;
  font-family:var(--mono);font-size:.78rem;letter-spacing:.06em;
  padding:.65rem 1.4rem;
  border-radius:2px;
  box-shadow:0 0 20px rgba(255,60,110,.5);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  z-index:999;
  pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ════════════════════════════════════════════
   SHARED ANIMATIONS
════════════════════════════════════════════ */
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
@keyframes fadeUp  {from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- Animated particle grid -->
<canvas id="bg-canvas"></canvas>

<div class="app">

  <!-- ── HEADER ── -->
  <header>
    <div class="logo-line">
      <span class="logo-bracket">[</span>
      <h1>QR GENERATOR</h1>
      <span class="logo-bracket">]</span>
    </div>
    <p class="tagline">URL &nbsp;·&nbsp; TEXTO &nbsp;·&nbsp; CONTACTO &nbsp;<span>_</span></p>
  </header>

  <!-- ── MAIN GRID ── -->
  <div class="grid">

    <!-- LEFT: Form -->
    <div class="panel">
      <div class="panel-title">CONFIGURACIÓN</div>

      <div class="tabs">
        <button class="tab active" data-tab="url">🔗 URL</button>
        <button class="tab"        data-tab="text">📄 TEXTO</button>
        <button class="tab"        data-tab="contact">👤 CONTACTO</button>
      </div>

      <!-- URL -->
      <div class="fields active" id="tab-url">
        <div class="field">
          <label>Dirección URL</label>
          <input type="text" id="url-input" placeholder="github.com/iivanrld"/>
        </div>
      </div>

      <!-- TEXTO -->
      <div class="fields" id="tab-text">
        <div class="field">
          <label>Texto libre</label>
          <textarea id="text-input" rows="4" placeholder="Cualquier contenido…"></textarea>
        </div>
      </div>

      <!-- CONTACTO -->
      <div class="fields" id="tab-contact">
        <div class="field">
          <label>Nombre completo *</label>
          <input type="text" id="c-name" placeholder="Iván Roldán Heredia"/>
        </div>
        <div class="field">
          <label>Teléfono *</label>
          <input type="tel" id="c-phone" placeholder="+34 600 000 000"/>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="c-email" placeholder="ivanrld.02@gmail.com"/>
        </div>
        <div class="field">
          <label>Empresa</label>
          <input type="text" id="c-org" placeholder="Nombre de empresa"/>
        </div>
        <div class="field">
          <label>Sitio web</label>
          <input type="text" id="c-url" placeholder="https://github.com/iivanrld"/>
        </div>
      </div>

      <!-- Colors -->
      <div class="color-row" style="margin-top:1rem">
        <div class="field">
          <label>Color QR</label>
          <input type="color" id="fg-color" value="#00ff9f"/>
        </div>
        <div class="field">
          <label>Fondo QR</label>
          <input type="color" id="bg-color" value="#0a0a12"/>
        </div>
      </div>

      <button class="btn-gen" id="btn-gen">
        <div class="btn-gen-bg"></div>
        <span>GENERAR QR</span>
      </button>
    </div>

    <!-- RIGHT: Preview -->
    <div class="panel preview">
      <div class="panel-title">VISTA PREVIA</div>

      <div class="empty-state" id="empty-state">
        <div class="empty-icon">▣</div>
        <div class="empty-text">Esperando datos…</div>
      </div>

      <div class="spinner" id="spinner"></div>

      <div class="qr-wrap" id="qr-wrap">
        <div class="qr-corners"></div>
        <div class="scan-line" id="scan-line"></div>
        <img id="qr-img" alt="QR Code"/>
      </div>

      <div class="data-badge" id="data-badge"></div>

      <button class="btn-dl" id="btn-dl">⬇ DESCARGAR PNG</button>
    </div>

  </div><!-- /grid -->

</div><!-- /app -->

<div id="toast"></div>

<!-- ════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════ -->
<script>
/* ── Particle grid canvas ── */
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  const COLS   = 28, ROWS = 18;
  let W, H, dots = [];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    dots = [];
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        dots.push({
          x: (c/(COLS-1))*W,
          y: (r/(ROWS-1))*H,
          ox:(c/(COLS-1))*W,
          oy:(r/(ROWS-1))*H,
          vx:0,vy:0,
          phase:Math.random()*Math.PI*2,
          speed:0.005+Math.random()*0.008,
          amp:3+Math.random()*4,
        });
      }
    }
  }

  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    t+=.5;

    // update positions
    dots.forEach(d=>{
      d.x = d.ox + Math.sin(t*d.speed+d.phase)*d.amp;
      d.y = d.oy + Math.cos(t*d.speed+d.phase*1.3)*d.amp;
    });

    // draw connections
    ctx.lineWidth=.4;
    for(let i=0;i<dots.length;i++){
      for(let j=i+1;j<dots.length;j++){
        const dx=dots[i].x-dots[j].x, dy=dots[i].y-dots[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<W/COLS*1.6){
          const alpha=(1-dist/(W/COLS*1.6))*0.25;
          ctx.strokeStyle=`rgba(0,255,159,${alpha})`;
          ctx.beginPath();
          ctx.moveTo(dots[i].x,dots[i].y);
          ctx.lineTo(dots[j].x,dots[j].y);
          ctx.stroke();
        }
      }
    }
    // draw dots
    dots.forEach(d=>{
      ctx.fillStyle='rgba(0,255,159,0.55)';
      ctx.beginPath();
      ctx.arc(d.x,d.y,1.5,0,Math.PI*2);
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize',resize);
  resize();
  draw();
})();

/* ── App logic ── */
let currentTab  = 'url';
let currentB64  = '';

// Tabs
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.fields').forEach(f=>f.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${currentTab}`).classList.add('active');
  });
});

// Generate
document.getElementById('btn-gen').addEventListener('click', async()=>{
  const fg = document.getElementById('fg-color').value;
  const bg = document.getElementById('bg-color').value;

  let body = {type:currentTab, color:fg, bgcolor:bg};

  if(currentTab==='url'){
    body.url = document.getElementById('url-input').value.trim();
  } else if(currentTab==='text'){
    body.text= document.getElementById('text-input').value.trim();
  } else {
    body.name  = document.getElementById('c-name').value.trim();
    body.phone = document.getElementById('c-phone').value.trim();
    body.email = document.getElementById('c-email').value.trim();
    body.org   = document.getElementById('c-org').value.trim();
    body.url   = document.getElementById('c-url').value.trim();
  }

  setLoading(true);
  try{
    const res  = await fetch('/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
    const json = await res.json();
    if(!res.ok){ showToast(json.error||'Error'); return; }
    currentB64 = json.image;
    showQR(currentB64, json.data);
  } catch(e){
    showToast('Error de red: '+e.message);
  } finally{
    setLoading(false);
  }
});

// Download
document.getElementById('btn-dl').addEventListener('click', async()=>{
  if(!currentB64) return;
  const res  = await fetch('/download',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({image:currentB64}),
  });
  const blob = await res.blob();
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'qr_code.png';
  a.click();
});

// Helpers
function showQR(b64, data){
  document.getElementById('empty-state').style.display='none';
  const wrap = document.getElementById('qr-wrap');
  wrap.classList.remove('visible');
  // re-trigger animation
  void wrap.offsetWidth;
  document.getElementById('qr-img').src = `data:image/png;base64,${b64}`;
  wrap.classList.add('visible');
  // re-trigger scan line
  const sl = document.getElementById('scan-line');
  sl.style.animation='none'; void sl.offsetWidth;
  sl.style.animation='';
  document.getElementById('data-badge').textContent = data;
  const dl = document.getElementById('btn-dl');
  dl.classList.remove('visible'); void dl.offsetWidth;
  dl.classList.add('visible');
}

function setLoading(on){
  document.getElementById('spinner').style.display = on?'block':'none';
  document.getElementById('btn-gen').disabled      = on;
  if(on){
    document.getElementById('qr-wrap').classList.remove('visible');
    document.getElementById('btn-dl').classList.remove('visible');
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

// Enter key support
document.addEventListener('keydown', e=>{
  if(e.key==='Enter'&&e.ctrlKey){
    document.getElementById('btn-gen').click();
  }
});
</script>
</body>
</html>
